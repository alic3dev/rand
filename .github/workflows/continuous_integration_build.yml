name: continuous_integration_build
on:
  push:
    branches: ["core"]
  pull_request:
    branches: ["*"]
env:
  target_device_version_ios: 18.5
  target_device_version_macos: 15.5
jobs:
  continuous_integration_build:
    runs-on: macos-latest
    steps:
      - name: git_initialization
        run: git config --global init.defaultBranch core
      - name: checkout_rand
        uses: actions/checkout@v4
        with:
          repository: alic3dev/rand
          path: rand
      - name: checkout_clic3
        uses: actions/checkout@v4
        with:
          repository: alic3dev/clic3
          path: clic3
      - name: make:clic3
        run: cd clic3 && make target_device_version=${{ env.target_device_version_macos }}
      - name: make:rand
        run: cd rand && make target_device_version=${{ env.target_device_version_macos }}
      - name: make:clic3_ios
        run: cd clic3 && make target_device_version=${{ env.target_device_version_ios }} target_device=iphone
      - name: make:rand_ios
        run: cd rand && make target_device_version=${{ env.target_device_version_ios }} target_device=iphone
